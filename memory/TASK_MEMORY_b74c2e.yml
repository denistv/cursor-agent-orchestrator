      ## Обзор решения
      Исправление должно остаться локальным в пределах текущей трёхслойной схемы `handler -> storage -> SQLite`: HTTP-контракт CRUD не меняется, а основная работа переносится в инициализацию SQLite и regression-покрытие сценария записи с последующим чтением из файловой БД.

      Ключевое архитектурное решение: сначала зафиксировать воспроизводимый integration/regression-сценарий для файлового DSN, затем минимально скорректировать инициализацию подключения так, чтобы сервер всегда работал с однозначно определённым SQLite-источником и сохранял текущие гарантии по `:memory:` и устойчивости к `database is locked`.

      ## Компоненты системы
      - `cmd/server/main.go` — остаётся точкой входа, но получает выделенную логику подготовки DSN по умолчанию и логирование фактического пути/DSN, с которым поднят сервер.
      - `internal/storage/sqlite.go` — остаётся единственной SQLite-реализацией интерфейса `Storage`; сюда выносится финальная настройка `*sql.DB` и PRAGMA/параметры пула, влияющие на надёжность записи.
      - `internal/handler/item.go` — без изменения публичного поведения; handler продолжает преобразовывать ошибки storage в `500`/`404`/`400`.
      - Тестовый слой — расширяется отдельными regression-тестами для файловой SQLite, потому что текущие тесты на `:memory:` не доказывают persistence после повторного открытия БД.

      ## Структуры данных
      Основная модель `model.Item` и request DTO (`CreateItemRequest`, `UpdateItemRequest`) сохраняются без изменений:
      - `id int64`
      - `title string`
      - `done bool`
      - `created_at time.Time`

      Схема БД также сохраняется:
      - Таблица `items`
      - Поля: `id INTEGER PRIMARY KEY AUTOINCREMENT`, `title TEXT NOT NULL`, `done BOOLEAN NOT NULL DEFAULT 0`, `created_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP`

      Дополнительно вводится только внутренняя конфигурационная логика подготовки DSN:
      - явный DSN из `DATABASE_URL` используется как есть;
      - специальный DSN `:memory:` не преобразуется;
      - дефолтный файловый DSN приводится к однозначному файловому пути, чтобы запись и последующая проверка смотрели в один и тот же SQLite-файл.

      ## API и интерфейсы
      Публичный HTTP API не меняется:
      - `POST /items` -> `201 Created` + JSON `Item`
      - `GET /items` -> `200 OK` + `[]Item`
      - `GET /items/{id}` -> `200 OK` + `Item`, `404` если запись отсутствует
      - `PUT /items/{id}` -> `200 OK` + `Item`
      - `DELETE /items/{id}` -> `204 No Content`

      Внутренние интерфейсы также сохраняются:
      - `storage.Storage`
      - `storage.NewSQLiteStorage(dsn string) (*SQLiteStorage, error)`

      Рекомендуемое внутреннее расширение:
      - выделить helper уровня сервера или storage для нормализации/разрешения DSN по умолчанию;
      - при инициализации `*sql.DB` явно выставить `SetMaxOpenConns(1)` и `SetMaxIdleConns(1)`;
      - применить `busy_timeout` через PRAGMA или DSN-параметр, не меняя вызывающий код handler.

      ## Технологический стек
      Стек остаётся прежним:
      - Go 1.23+
      - `database/sql`
      - `github.com/mattn/go-sqlite3`
      - `github.com/go-chi/chi/v5`
      - стандартный `testing`

      Допустимые дополнительные средства только из стандартной библиотеки:
      - `path/filepath` для однозначного разрешения файлового пути БД;
      - `os` / `t.TempDir()` для regression-тестов на файловой SQLite.

      ## Файловая структура
      Предполагаемые изменения по файлам:
      - `examples/go-rest-api/cmd/server/main.go` — вынести подготовку DSN в helper и добавить логирование фактического SQLite-источника.
      - `examples/go-rest-api/cmd/server/config.go` или локальный helper в `main.go` — функция разрешения дефолтного DSN.
      - `examples/go-rest-api/internal/storage/sqlite.go` — централизовать настройки пула/PRAGMA для SQLite.
      - `examples/go-rest-api/internal/storage/sqlite_test.go` — добавить regression-тест "create -> close -> reopen -> read from same file DB".
      - при необходимости `examples/go-rest-api/cmd/server/main_test.go` или `config_test.go` — тест на корректное разрешение дефолтного DSN и сохранение special-case для `:memory:`.

      ## Открытые решения
      - Основной рекомендуемый путь: исправлять именно подготовку DSN и regression-покрытие, а не переписывать CRUD-методы, потому что публичный API и базовая storage-логика уже соответствуют требованиям.
      - Если в процессе реализации regression-тест покажет, что причина не в разрешении пути, а в lifecycle соединения, разработчику следует в том же `internal/storage/sqlite.go` локально усилить инициализацию подключения/PRAGMA без изменения интерфейса `Storage`.
      - Интеграционный тест уровня HTTP необязателен, если файловый regression-тест storage надёжно воспроизводит баг; приоритет у более быстрого и детерминированного теста на storage-слое.
    status: done

