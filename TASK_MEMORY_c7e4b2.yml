      ## Обзор решения

      Режим **Room** — отдельная ветка контента в `main` после успешного выбора задачи: игровая openspace-сцена с шестью фиксированными ролями (`AGENT_TYPES`). Позиции персонажей полностью определяются **одной** чистой функцией от выбранной `TaskRecord | null` и флага «можно ли доверять сцене» (нет загрузки/ошибки/рассинхрона выбора). Источник истины для «кто за столом» — `getCurrentExecution(task)` + `execution.status === 'in-progress'`; иначе все в лаунже. Новых API и парсинга YAML на клиенте не вводим.

      **Ключевые решения:** (1) единое правило «задача завершена» для лаунжа — см. ниже; (2) один общий `TaskSelector` слева, без дубля в Room; (3) анимация перемещения — лёгкая CSS-трансформация по умолчанию, отключаемая через `prefers-reduced-motion`; (4) при `isLoading` / `error` / отсутствии `selectedTask` ветка `RoomView` **не рендерится**, чтобы не показывать сцену от предыдущей задачи; чистая функция при этом может вызываться с `task: null` и `sceneAllowed: false` только из тестов или внутренних утилит.

      ## Компоненты системы

      | Компонент | Ответственность |
      |-----------|-----------------|
      | `App.tsx` | Состояние вида `dashboardView: 'live' \| 'room'`; переключатель (русские подписи); условный рендер `main`: при ошибке/загрузке/пустом списке — текущие empty-state; при валидной задаче — либо блок Live (как сейчас), либо `RoomView`. Прокидывает в Room только `task`, когда сцена валидна. |
      | `RoomView` | Композиция сцены: фон openspace, зона лаунжа, зона столов/ПК; рендер шести слотов агентов по результату `computeAgentPlacements`; обёртка с классом для `prefers-reduced-motion`. |
      | `AgentCharacter` (или 6 тонких подкомпонентов) | Один персонаж: SVG/CSS, уникальный силуэт/палитра на роль; подпись/тултип с `AGENT_LABELS[agentType]`; опционально мини-бейдж статуса текущего execution у персонажа за столом. |
      | `computeAgentPlacements` | Чистая функция: вход → для каждого `AgentType` зона `lounge \| desk` + метаданные для UI (например `highlightStatus: ExecutionStatus \| null` только для агента за столом). |
      | Стили | Классы зон и персонажей: расширение `App.css` **или** локальный `RoomView.css` импортируемый только из `RoomView` (на усмотрение разработчика; цвета ролей — согласовать с `.exec-agent-*` в `App.css`). |

      ```mermaid
      graph LR
        App --> RoomView
        App --> LivePanels[Live: Summary FSM Timeline Detail]
        RoomView --> computeAgentPlacements
        computeAgentPlacements --> types_ts["types.ts: TaskRecord Execution getCurrentExecution"]
        RoomView --> AgentCharacter
      ```

      ## Структуры данных

      Новые типы (файл `dashboard/src/room/placement.ts` или секция в `types.ts` — на выбор разработчика, предпочтительно отдельный модуль рядом с Room):

      ```ts
      export type RoomZone = 'lounge' | 'desk'

      export interface AgentRoomPlacement {
        agentType: AgentType
        zone: RoomZone
        /** Статус текущего execution, если этот агент за столом; иначе null */
        activeExecutionStatus: ExecutionStatus | null
      }

      export type AgentPlacementsMap = Record<AgentType, AgentRoomPlacement>

      /**
       * @param task — выбранная задача; null = все в лаунже
       * @param sceneAllowed — false при loading/error или когда родитель намеренно не показывает сцену
       */
      export function computeAgentPlacements(
        task: TaskRecord | null,
        sceneAllowed: boolean,
      ): AgentPlacementsMap
      ```

      **Алгоритм `computeAgentPlacements`:**

      1. Инициализировать все `AgentType` с `zone: 'lounge'`, `activeExecutionStatus: null`.
      2. Если `!sceneAllowed` или `task === null` → вернуть карту (все лаунж).
      3. Если задача **завершена для Room** (см. правило ниже) → вернуть карту (все лаунж).
      4. `const current = getCurrentExecution(task)`.
      5. Если `!current` или `current.status !== 'in-progress'` → вернуть карту (все лаунж).
      6. Иначе: для `current.agentType` установить `zone: 'desk'`, `activeExecutionStatus: current.status`; остальные без изменений (лаунж).

      **Единое правило «задача завершена» (закрывает открытый вопрос анализа):** считать задачу завершённой для Room, если **`task.phase === 'done'` ИЛИ `task.finishedAt !== null`**. В этом состоянии персонажи не «работают за ПК», даже если последний execution в списке ещё `done`, а следующий от оркестратора не создан: `getCurrentExecution` может указывать на `done`, что не `in-progress` → все в лаунже; плюс при `phase === 'done'` лаунж гарантирован явно.

      ## API и интерфейсы

      - HTTP/WebSocket контракты **без изменений**.
      - Публичный UI-контракт `RoomView`:

        ```tsx
        export type RoomViewProps = {
          task: TaskRecord
          className?: string
        }
        ```

        Родитель (`App`) обязан рендерить `RoomView` **только** когда уже есть валидная `selectedTask` и нет `isLoading`/`error` (как для Live). Таким образом «не показывать старую сцену» достигается тем, что при переходе в loading/error ветка Room не монтируется; при смене `taskId` проп `task` обновляется синхронно с мемоизированным `selectedTask`.

      - Переключатель вида (пример пропсов): `value: 'live' | 'room'`, `onChange`, подписи на русском: «Сводка» / «Комната» или «Live» / «Room» — согласовать с тоном существующих заголовков (рекомендация: **«Сводка»** и **«Комната»**).

      ## Технологический стек

      - React 19 + TypeScript (как в проекте), без новых зависимостей для v1.
      - Персонажи и декор: inline SVG и/или CSS-формы; пиксельный вид: целочисленный масштаб (`transform: scale(N)` с целым N) + `image-rendering: pixelated` и fallback `crisp-edges` где уместно.
      - Доступность: `@media (prefers-reduced-motion: reduce)` — отключить transition/animation на перемещении и idle; допустима полностью статичная сцена.

      ## Файловая структура

      - `dashboard/src/App.tsx` — состояние вида, переключатель, ветвление `main`.
      - `dashboard/src/components/RoomView.tsx` — сцена Room.
      - `dashboard/src/components/room/AgentCharacter.tsx` (опционально папка `room/` для мелких SVG-слоёв по ролям).
      - `dashboard/src/room/placement.ts` — `computeAgentPlacements`, типы `RoomZone`, `AgentRoomPlacement`, экспорт тестируемого ядра.
      - `dashboard/src/room/placement.test.ts` — юнит-тесты чистой функции (если в проекте принят vitest/jest — следовать существующему раннеру).
      - Стили: правки `dashboard/src/App.css` и/или `dashboard/src/components/RoomView.css`.

      ## Открытые решения (с рекомендациями)

      | Вопрос из анализа | Решение |
      |-------------------|---------|
      | Дублировать TaskSelector в Room? | **Нет** — достаточно левой колонки. |
      | Полноэкранный Room без сайдбара? | **Не в v1** — сохраняем текущий `workspace` grid; Room занимает область `main-content`. При желании позже — отдельная итерация. |
      | Анимация lounge ↔ desk? | **Да, лёгкая** (200–300ms opacity/transform), уважая `prefers-reduced-motion`; допустима **мгновенная** смена как минимально жизнеспособный вариант, если время поджимает. |

      ## Критерии для разработчика (приёмка)

      1. Переключатель Live/Room не сбрасывает выбранный `taskId` в селекторе.
      2. Смена задачи в `TaskSelector` пересчитывает сцену; данные сцены всегда из **текущего** `selectedTask`, совпадающего с `resolvedTaskId`.
      3. Для валидной незавершённой задачи: если `getCurrentExecution(task).status === 'in-progress'`, ровно один персонаж (с `agentType` текущего execution) в рабочей зоне; остальные пять в лаунже.
      4. Во всех прочих случаях (нет задачи, loading, error, завершённая задача по правилу ИЛИ, текущий execution не `in-progress`) — все шесть в лаунже.
      5. При `prefers-reduced-motion: reduce` нет заметных анимаций перемещения/idle.
      6. Цвета/классы ролей визуально согласованы с `.exec-agent-*` (или переиспользуют те же токены CSS).
      7. Не дублировать парсинг YAML; использовать только типы и `getCurrentExecution` из `types.ts`.

      ## Следующий этап: development

      Реализация по файловой структуре и контрактам выше; оркестратор создаёт execution `agent_type: development`.
