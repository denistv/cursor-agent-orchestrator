      ## Решение: Request Changes

      ## Серьёзные проблемы

      ### [internal/handler/item.go:51,73] Нет ограничения размера тела запроса
      Что не так: `json.NewDecoder(r.Body).Decode(&req)` читает тело без ограничения размера.
      Злоумышленник может прислать многогигабайтный payload — сервер будет потреблять
      память пропорционально размеру тела, что приведёт к DoS.
      Как исправить: обернуть `r.Body` через `http.MaxBytesReader` перед декодированием, например:
      `r.Body = http.MaxBytesReader(w, r.Body, 1<<20)` (1 MB лимит) в `CreateItem` и `UpdateItem`.
      При ошибке лимита декодирование вернёт ошибку — её нужно обработать как 400.

      ### [internal/storage/sqlite.go:21] Нет ограничения пула соединений для SQLite
      Что не так: `sql.Open` создаёт пул с неограниченным числом соединений по умолчанию.
      SQLite поддерживает только одного параллельного писателя: конкурентные запросы
      на запись будут падать с ошибкой "database is locked", что приведёт к 500-ым в production.
      Как исправить: после `db.Ping()` добавить `db.SetMaxOpenConns(1)`.
      Альтернатива — включить WAL mode через `PRAGMA journal_mode=WAL` при инициализации,
      что позволит параллельные читатели, но всё равно потребует ограничение писателей.

      ## Замечания (некритичные)

      - [internal/handler/item_test.go:41-43] `mockStorage.CreateItem` возвращает `storage.ErrNotFound`
        при пустом title — семантически неверно (хендлер проверяет title до вызова storage,
        поэтому тесты проходят, но mock вводит в заблуждение). Лучше вернуть обычную ошибку.
      - [cmd/server/main.go:50-53] `os.Exit(1)` внутри горутины пропускает `defer store.Close()`.
        Некритично (ОС закроет дескрипторы), но идиоматичнее передавать ошибку через channel
        и завершать `main` штатно.
      - [internal/storage/sqlite_test.go:57-58] Ошибки `CreateItem` игнорируются — если они
        вдруг появятся, тест упадёт по другой причине. Лучше явно проверять: `if _, err := s.CreateItem(...); err != nil { t.Fatal(err) }`.
    status: done

