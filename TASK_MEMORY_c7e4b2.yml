      ## Ручные сценарии (приёмка)

      1. **Переключатель и выбор задачи:** открыть дашборд с несколькими задачами; выбрать задачу A; переключить «Сводка» ↔ «Комната» несколько раз — `taskId` в селекторе не сбрасывается.
      2. **Комната при активной работе:** для задачи, у которой текущий execution (по `current_execution_id` / `isCurrent` / последний) в статусе `in-progress`, открыть «Комната» — ровно один персонаж в рабочей зоне, роль совпадает с `agent_type` этого execution; у него бейдж «В процессе»; остальные пять в лаунже с подписями ролей.
      3. **Все в лаунже:** для задачи с текущим execution в `new` / `done` / `fail`, или завершённой по правилу (`phase === 'done'` или непустой `finishedAt`) — в «Комната» все шесть в лаунже, никого за столом с бейджем.
      4. **Нет устаревшей сцены:** симулировать состояние загрузки или ошибки (или пустой список) — основной контент не показывает `RoomView`; после восстановления данных комната соответствует выбранной задаче.
      5. **Смена задачи:** переключить задачу B ↔ A в селекторе в режиме «Комната» — расстановка пересчитывается по новой выбранной записи.
      6. **prefers-reduced-motion:** в системных настройках включить уменьшение анимации — у агентов не должно быть заметной анимации появления (класс `room-scene` / отключённые transition согласно `App.css`).

      ## Предложенные юнит-тесты (только текст; файл не создавался)

      **Путь (рекомендация):** `ai/dev-studio/dashboard/src/room/placement.test.ts` после добавления vitest в проект.

      ```typescript
      import { describe, it, expect } from 'vitest'
      import { computeAgentPlacements } from './placement.ts'
      import { AGENT_TYPES, type AgentType, type Execution, type TaskRecord } from '../types.ts'

      function baseExecution(overrides: Partial<Execution> & Pick<Execution, 'id' | 'agentType' | 'status'>): Execution {
        return {
          parentExecutionId: null,
          startedAt: null,
          finishedAt: null,
          outputData: '',
          nextPhase: null,
          isReturn: false,
          isCurrent: false,
          ...overrides,
        }
      }

      function baseTask(overrides: Partial<TaskRecord>): TaskRecord {
        return {
          taskId: 'test-task',
          memoryFileName: null,
          memoryFilePath: null,
          memoryTaskId: null,
          phase: 'development',
          currentExecutionId: null,
          startedAt: null,
          finishedAt: null,
          description: '',
          executions: [],
          ...overrides,
        }
      }

      function expectAllLounge(map: ReturnType<typeof computeAgentPlacements>) {
        for (const t of AGENT_TYPES) {
          expect(map[t].zone).toBe('lounge')
          expect(map[t].activeExecutionStatus).toBeNull()
        }
      }

      describe('computeAgentPlacements', () => {
        it('sceneAllowed false returns all lounge even with in-progress current', () => {
          const task = baseTask({
            executions: [
              baseExecution({ id: 1, agentType: 'testing', status: 'in-progress', isCurrent: true }),
            ],
            currentExecutionId: 1,
          })
          expectAllLounge(computeAgentPlacements(task, false))
        })

        it('task null returns all lounge', () => {
          expectAllLounge(computeAgentPlacements(null, true))
        })

        it('phase done returns all lounge', () => {
          const task = baseTask({
            phase: 'done',
            executions: [
              baseExecution({ id: 1, agentType: 'development', status: 'in-progress', isCurrent: true }),
            ],
            currentExecutionId: 1,
          })
          expectAllLounge(computeAgentPlacements(task, true))
        })

        it('finishedAt set returns all lounge', () => {
          const task = baseTask({
            finishedAt: '2026-04-16T00:00:00.000Z',
            executions: [
              baseExecution({ id: 1, agentType: 'architect', status: 'in-progress', isCurrent: true }),
            ],
            currentExecutionId: 1,
          })
          expectAllLounge(computeAgentPlacements(task, true))
        })

        it('current execution not in-progress returns all lounge', () => {
          const task = baseTask({
            executions: [
              baseExecution({ id: 2, agentType: 'development', status: 'done', isCurrent: true }),
            ],
            currentExecutionId: 2,
          })
          expectAllLounge(computeAgentPlacements(task, true))
        })

        it('current execution in-progress moves only that agent to desk', () => {
          const task = baseTask({
            executions: [
              baseExecution({ id: 1, agentType: 'analysis', status: 'done' }),
              baseExecution({ id: 2, agentType: 'architect', status: 'in-progress', isCurrent: true }),
            ],
            currentExecutionId: 2,
          })
          const map = computeAgentPlacements(task, true)
          for (const t of AGENT_TYPES) {
            if (t === 'architect') {
              expect(map[t].zone).toBe('desk')
              expect(map[t].activeExecutionStatus).toBe('in-progress')
            } else {
              expect(map[t].zone).toBe('lounge')
              expect(map[t].activeExecutionStatus).toBeNull()
            }
          }
        })

        it('respects currentExecutionId over isCurrent and last item', () => {
          const task = baseTask({
            executions: [
              baseExecution({ id: 1, agentType: 'analysis', status: 'done', isCurrent: false }),
              baseExecution({ id: 2, agentType: 'testing', status: 'in-progress', isCurrent: false }),
              baseExecution({ id: 3, agentType: 'tech-writer', status: 'new', isCurrent: true }),
            ],
            currentExecutionId: 2,
          })
          const map = computeAgentPlacements(task, true)
          expect(map.testing.zone).toBe('desk')
          expect(map['tech-writer'].zone).toBe('lounge')
        })

        it('every AgentType key is present', () => {
          const map = computeAgentPlacements(null, true)
          const keys = Object.keys(map) as AgentType[]
          expect(keys.sort()).toEqual([...AGENT_TYPES].sort())
        })
      })
      ```

