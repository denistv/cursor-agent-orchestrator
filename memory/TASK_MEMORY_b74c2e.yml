      ## Функциональные требования
      - Найти и устранить причину, по которой в `examples/go-rest-api` после успешного создания записи через `POST /items` данные не сохраняются в SQLite.
      - После исправления `POST /items` должен по-прежнему возвращать `201 Created` и JSON созданной сущности `Item` с корректными полями `id`, `title`, `done`, `created_at`.
      - Созданная запись должна быть доступна в последующих операциях чтения через текущее хранилище: `GET /items` и `GET /items/{id}`.
      - Сохранение должно происходить в SQLite по тому DSN, с которым запущен сервер, включая файловую БД по умолчанию и поддерживаемый режим `:memory:` для тестов.
      - Исправление не должно ломать существующие сценарии `PUT /items/{id}` и `DELETE /items/{id}`, которые опираются на ту же реализацию storage.
      - Нужно сохранить текущую трёхслойную архитектуру `handler -> storage -> SQLite`; публичный HTTP-контракт CRUD API не должен меняться без крайней необходимости.
      - Требуется воспроизводимый способ проверки бага и подтверждение исправления, предпочтительно через автотест(ы), покрывающие запись и последующее чтение/повторное открытие SQLite там, где это релевантно к причине дефекта.
      - При ошибках записи или чтения API должен продолжать возвращать корректный код `500` без утечки внутренних деталей во внешний ответ.
      
      ## Нефункциональные требования
      - Решение должно остаться совместимым с текущим стеком: Go, `database/sql`, драйвер `github.com/mattn/go-sqlite3`, роутер `chi`.
      - Нужно сохранить корректную работу SQLite в условиях ограничений пула соединений и не ухудшить устойчивость к ошибкам вида `database is locked`.
      - Валидация входных данных и текущие ограничения HTTP-слоя (`MaxBytesReader`, проверка `title`) должны сохраниться.
      - Тесты должны оставаться быстрыми и детерминированными; если добавляется regression coverage, она не должна зависеть от внешних сервисов.
      - Исправление должно быть локальным и минимально инвазивным: без ненужного изменения API, структуры проекта и пользовательского сценария запуска.
      
      ## Открытые вопросы
      - Критических открытых вопросов нет: описание задачи и текущий код дают достаточно контекста, чтобы перейти к проектированию исправления.
      
      ## Контекст для архитектора
      - Баг относится к примеру `examples/go-rest-api`; основной фокус расследования — `internal/storage/sqlite.go` и способ инициализации/использования SQLite в `cmd/server/main.go`.
      - Нужно отдельно проверить различие между поведением `:memory:` в тестах и файлового DSN в реальном запуске, чтобы не принять ложноположительное решение на основе только unit-тестов.
      - Полезно спроектировать regression-проверку именно на сценарий "создали запись -> перечитали из SQLite/нового контекста доступа -> запись сохранилась", потому что существующие тесты storage в основном проверяют happy path в рамках одного экземпляра хранилища.
      - В README уже зафиксирован ожидаемый CRUD-контракт и использование SQLite; архитектурное решение должно оставаться согласованным с этой документацией.
