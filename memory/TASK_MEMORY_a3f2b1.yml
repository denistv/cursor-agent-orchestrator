      ## Обзор решения

      Трёхслойный REST API на Go: transport (handler), storage (data), model (shared types).
      Роутер chi обеспечивает удобную маршрутизацию и path-параметры. SQLite подключается
      через CGO-драйвер go-sqlite3 и стандартный database/sql. Зависимости минимальны.
      Ресурс — Item (TODO-задача): поля title + done.

      Ключевые решения:
      - chi v5 как роутер — идиоматичен, совместим с net/http, нет vendor lock-in
      - go-sqlite3 через CGO — зрелый, стабильный, не требует внешнего процесса
      - Storage за интерфейсом — handler тестируется через mock, storage — через in-memory БД (:memory:)
      - Graceful shutdown через os.Signal + context.WithCancel

      ## Компоненты системы

      | Компонент          | Файл                            | Ответственность                                          |
      |--------------------|---------------------------------|----------------------------------------------------------|
      | Entrypoint         | cmd/server/main.go              | Инициализация, wire-up, запуск HTTP-сервера              |
      | Model              | internal/model/item.go          | Общие типы: Item, CreateItemRequest, UpdateItemRequest   |
      | Storage interface  | internal/storage/storage.go     | Контракт репозитория                                     |
      | SQLite storage     | internal/storage/sqlite.go      | Реализация репозитория через database/sql                |
      | Item handler       | internal/handler/item.go        | HTTP-хэндлеры CRUD для /items                            |
      | Health handler     | internal/handler/health.go      | GET /health                                              |
      | Router             | internal/handler/router.go      | Сборка chi-роутера и регистрация маршрутов               |

      Зависимости: main → handler/router → ItemHandler → Storage interface ← sqlite.go

      ## Структуры данных

      ```go
      // internal/model/item.go
      package model

      import "time"

      type Item struct {
          ID        int64     `json:"id"`
          Title     string    `json:"title"`
          Done      bool      `json:"done"`
          CreatedAt time.Time `json:"created_at"`
      }

      type CreateItemRequest struct {
          Title string `json:"title"`
          Done  bool   `json:"done"`
      }

      type UpdateItemRequest struct {
          Title string `json:"title"`
          Done  bool   `json:"done"`
      }
      ```

      SQLite DDL (выполняется при инициализации storage):
      ```sql
      CREATE TABLE IF NOT EXISTS items (
          id         INTEGER  PRIMARY KEY AUTOINCREMENT,
          title      TEXT     NOT NULL,
          done       BOOLEAN  NOT NULL DEFAULT 0,
          created_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP
      );
      ```

      ## API и интерфейсы

      ### Storage interface
      ```go
      // internal/storage/storage.go
      package storage

      import "github.com/example/go-rest-api/internal/model"

      type Storage interface {
          GetItems() ([]model.Item, error)
          GetItemByID(id int64) (*model.Item, error)
          CreateItem(req model.CreateItemRequest) (*model.Item, error)
          UpdateItem(id int64, req model.UpdateItemRequest) (*model.Item, error)
          DeleteItem(id int64) error
          Close() error
      }
      ```

      ### SQLiteStorage constructor
      ```go
      // internal/storage/sqlite.go
      func NewSQLiteStorage(dsn string) (*SQLiteStorage, error)
      ```

      ### ItemHandler constructor + методы
      ```go
      // internal/handler/item.go
      func NewItemHandler(s storage.Storage) *ItemHandler

      func (h *ItemHandler) GetItems(w http.ResponseWriter, r *http.Request)
      func (h *ItemHandler) GetItemByID(w http.ResponseWriter, r *http.Request)  // chi.URLParam(r, "id")
      func (h *ItemHandler) CreateItem(w http.ResponseWriter, r *http.Request)
      func (h *ItemHandler) UpdateItem(w http.ResponseWriter, r *http.Request)   // chi.URLParam(r, "id")
      func (h *ItemHandler) DeleteItem(w http.ResponseWriter, r *http.Request)   // chi.URLParam(r, "id")
      ```

      ### Router
      ```go
      // internal/handler/router.go
      func NewRouter(itemHandler *ItemHandler) http.Handler
      // Маршруты:
      // GET  /health          → HealthHandler
      // GET  /items           → itemHandler.GetItems
      // POST /items           → itemHandler.CreateItem
      // GET  /items/{id}      → itemHandler.GetItemByID
      // PUT  /items/{id}      → itemHandler.UpdateItem
      // DELETE /items/{id}    → itemHandler.DeleteItem
      ```

      ### HTTP контракты

      | Метод  | Путь        | Request body        | Response   | Коды          |
      |--------|-------------|---------------------|------------|---------------|
      | GET    | /health     | —                   | {"status":"ok"} | 200      |
      | GET    | /items      | —                   | []Item     | 200           |
      | GET    | /items/{id} | —                   | Item       | 200, 404      |
      | POST   | /items      | CreateItemRequest   | Item       | 201, 400      |
      | PUT    | /items/{id} | UpdateItemRequest   | Item       | 200, 400, 404 |
      | DELETE | /items/{id} | —                   | —          | 204, 404      |

      Ошибки возвращаются как {"error": "сообщение"}.
      {id} — целое число; если не парсится → 400.

